name: goods-go-dev-app

services:
  app:
    image: goods-go-dev
    build:
      context: .
      dockerfile: dev.Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?required}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:?required}
      SUPABASE_INTERNAL_URL: http://supabase_kong_goods-go:8000
      SUPABASE_HEALTH_URL: http://supabase_auth_goods-go:9999/health
      WATCHPACK_POLLING: "true"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - dev

networks:
  dev:
    external: true
    name: supabase_network_goods-go
