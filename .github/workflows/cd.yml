name: CD (Continuous Deployment)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - feature/setup-cd-pipeline
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

    steps:
      - name: Deploy to Production
        run: |
          echo "Deploying to production branch: ${TARGET_BRANCH}..."

          cd /root/goods-go

          git fetch origin ${TARGET_BRANCH}

          # detached HEAD状態にならないよう、現在のブランチを最新の origin ブランチにリセット
          git checkout ${TARGET_BRANCH} || git checkout -b ${TARGET_BRANCH}
          git reset --hard origin/${TARGET_BRANCH}

          export PATH="$HOME/.local/bin:$PATH"
          eval "$(mise activate bash)"

          mise run prod:deploy
