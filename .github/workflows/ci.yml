name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.13.0"
  PNPM_VERSION: "10.28.1"

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Oxlint Check
        run: pnpm run lint

      - name: Oxfmt Format Check
        run: pnpm run fmt:check .

      - name: TypeScript Check
        run: pnpm run typecheck

  infrastructure:
    name: Infrastructure Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate shell syntax
        run: bash -n scripts/*.sh scripts/lib/*.sh

      - name: Validate development Compose
        run: |
          printf '%s\n' \
            'NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321' \
            'NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=ci-placeholder' \
            > .env.dev.generated
          docker compose --env-file .env.dev.generated -f compose.dev.yml config --quiet

      - name: Fetch pinned Supabase self-host stack
        run: bash scripts/prod-stack.sh sync

      - name: Validate production Compose
        run: |
          cp supabase/self-host-stack/docker/.env.example supabase/self-host-stack/docker/.env
          mkdir -p secrets
          printf 'ci-placeholder' > secrets/cloudflare-tunnel-token
          bash scripts/prod-stack.sh config
          bash scripts/prod-app.sh config
          ! grep -Eq 'image:.*:latest' compose.prod.yml
          ! grep -q '/var/run/docker.sock' compose.prod.yml

  supabase:
    name: Supabase Migration Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Validate migrations
        run: |
          pnpm exec supabase start > /dev/null
          pnpm exec supabase db reset --local
          pnpm exec supabase db lint --local --fail-on error
          pnpm exec supabase gen types typescript --local > /tmp/schema.gen.ts
          pnpm exec oxfmt /tmp/schema.gen.ts
          diff -u src/types/schema.gen.ts /tmp/schema.gen.ts

      - name: Stop Supabase
        if: always()
        run: pnpm exec supabase stop --project-id goods-go || true

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      NO_COLOR: "1"
      FORCE_COLOR: "0"
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: React Doctor
        id: react_doctor
        uses: millionco/react-doctor@c5a06bd8c0d5ade974549326b9131fa9b6ae8e6e
        with:
          directory: .
          project: goods-go
          verbose: true
          diff: origin/${{ github.base_ref || 'main' }}
          fail-on: error
          node-version: "24"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, infrastructure, supabase, react-doctor]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build
        run: pnpm run build
